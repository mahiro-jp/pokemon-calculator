<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモン計算ツール</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#333333">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ポケ計算">
    <link rel="apple-touch-icon" href="image/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="image/icon-512.png">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>◒ ポケモン計算ツール ◒</h1>
    </header>

    <main class="calc-container">
        
        <section class="player-box attacker">
            <h2>攻撃側</h2>
            <div class="form-row">
                <div class="form-group flex-2">
                    <label for="atk-name">ポケモン</label>
                    <input type="text" id="atk-name" placeholder="例: ガブリアス" autocomplete="off">
                </div>
                <div class="form-group flex-1">
                    <div class="type-badge" id="atk-type1">ーー</div>
                </div>
                <div class="form-group flex-1">
                    <div class="type-badge" id="atk-type2">ーー</div>
                </div>
            </div>

            <div class="race-values-row">
                <span class="race-title">種族値:</span>
                <span class="race-num" id="atk-race-hp">0</span>
                <span class="race-divider">-</span>
                <span class="race-num" id="atk-race-atk">0</span>
                <span class="race-divider">-</span>
                <span class="race-num" id="atk-race-def">0</span>
                <span class="race-divider">-</span>
                <span class="race-num" id="atk-race-spatk">0</span>
                <span class="race-divider">-</span>
                <span class="race-num" id="atk-race-spdef">0</span>
                <span class="race-divider">-</span>
                <span class="race-num" id="atk-race-spd">0</span>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="atk-item">持ち物</label>
                    <select id="atk-item">
                        <option value="">なし</option>
                        <option value="type-up">タイプ強化（1.2倍）</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="atk-ability">特性</label>
                    <select id="atk-ability">
                        <option value="">なし</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="atk-nature">性格</label>
                    <select id="atk-nature">
                        <option value="まじめ">まじめ</option>
                        <option value="いじっぱり">いじっぱり</option>
                        <option value="ひかえめ">ひかえめ</option>
                    </select>
                </div>
            </div>

            <div class="status-table">
                <div class="status-row status-header">
                    <div class="cell-label">能力</div>
                    <div class="cell-point">能力ポイント</div>
                    <div class="cell-nature">性格</div>
                    <div class="cell-rank">ランク</div>
                    <div class="cell-real">実数値</div>
                </div>

                <div class="status-row">
                    <div class="cell-label font-bold">ＨＰ</div>
                    <div class="cell-point">
                        <div class="counter-group">
                            <button type="button" class="btn-minus">-</button>
                            <input type="number" value="0" min="0" max="32" class="input-point">
                            <button type="button" class="btn-plus">+</button>
                        </div>
                    </div>
                    <div class="cell-nature"><span class="text-muted">ー</span></div>
                    <div class="cell-rank"><span class="text-muted">ー</span></div>
                    <div class="cell-real"><span class="real-value" id="atk-real-hp">0</span></div>
                </div>

                <div class="status-row">
                    <div class="cell-label font-bold">攻撃</div>
                    <div class="cell-point">
                        <div class="counter-group">
                            <button type="button" class="btn-minus">-</button>
                            <input type="number" value="0" min="0" max="32" class="input-point">
                            <button type="button" class="btn-plus">+</button>
                        </div>
                    </div>
                    <div class="cell-nature">
                        <select class="select-nature-adj">
                            <option value="plus">＋</option>
                            <option value="none" selected>±</option>
                            <option value="minus">－</option>
                        </select>
                    </div>
                    <div class="cell-rank">
                        <select class="select-rank-adj">
                            <option value="0" selected>±0</option>
                        </select>
                    </div>
                    <div class="cell-real"><span class="real-value" id="atk-real-atk">0</span></div>
                </div>
            </div>
        </section>

        <section class="player-box defender">
            <h2>防御側</h2>
            <div class="form-group">
                <label>ポケモン</label>
                <input type="text" placeholder="例: ブリジュラス" autocomplete="off">
            </div>
            <div class="placeholder-content">（防御側の詳細項目エリア）</div>
        </section>

        <section class="global-effects">
            <h2>全体効果</h2>
            <div class="placeholder-content">（天気・フィールドの選択エリア）</div>
        </section>

        <section class="result-box">
            <h2>計算結果</h2>
            <div class="placeholder-content">（通常時・急所時のダメージ、割合、確定数表示エリア）</div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Pokemon Champions Calculator</p>
    </footer>

</body>
</html>
